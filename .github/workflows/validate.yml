name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate plugin structure
        run: bash tests/test-plugin.sh structure

      - name: Validate plugin functionality
        run: bash tests/test-plugin.sh functional

      - name: Validate agent teams infrastructure
        run: bash tests/test-teams.sh

      - name: Check shell script syntax
        run: |
          errors=0
          for script in lib/*.sh scripts/*.sh tests/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              if ! bash -n "$script"; then
                errors=$((errors + 1))
              fi
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "FAIL: $errors script(s) have syntax errors"
            exit 1
          fi
          echo "All shell scripts pass syntax check"
