name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate skills and agents
        run: bash tests/validate-skills.sh skills

      - name: Validate plugin metadata and scripts
        run: bash tests/validate-skills.sh plugin

      - name: Security checks
        run: bash tests/validate-skills.sh security

      - name: Validate eval structure
        run: bash tests/validate-evals.sh

      - name: Check shell script syntax
        run: |
          errors=0
          for script in scripts/*.sh tests/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              if ! bash -n "$script"; then
                errors=$((errors + 1))
              fi
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "FAIL: $errors script(s) have syntax errors"
            exit 1
          fi
          echo "All shell scripts pass syntax check"
